services:
  backend:
    build: ./backend
    container_name: donation-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_statics:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=donation_project.settings

  frontend:
    image: node:20-alpine
    container_name: donation-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  backend_statics:
  frontend_node_modules: